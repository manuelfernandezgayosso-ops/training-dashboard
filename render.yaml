services:
  - type: web
    name: ironman-training-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_REFRESH_TOKEN
        sync: false
      - key: ATHLETE_NAME
        value: Anton
      - key: VOLUME_PROFILE
        value: high
      - key: OUTPUT_DIR
        value: data
      - key: DATA_DIR
        value: data
